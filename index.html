<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0b3a5b,#0f4c75);
font-family:Arial;
color:white;
text-align:center;
}

.logo{
width:75%;
max-width:380px;
margin-bottom:40px;
}

.botao{
width:85%;
max-width:420px;
text-align:center;
padding:30px;
font-size:28px;
background:white;
color:#0b3a5b;
text-decoration:none;
border-radius:20px;
font-weight:bold;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<img class="logo" src="https://lh3.googleusercontent.com/d/1xL_SJ9NgGVD9d9EDDOf2j6QfhMgG-oG_">

<a id="botao" class="botao" href="#">
🔗 ABRIR LINK
</a>

<script>

fetch("https://script.google.com/macros/s/SEU_SCRIPT_ID/exec")
.then(r => r.text())
.then(url => {
document.getElementById("botao").href = url;
});

</script>

</body>
</html>
